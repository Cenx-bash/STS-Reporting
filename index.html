<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>ICT in the Modern Era — Interactive Reference</title>
  <meta name="description" content="A world-class interactive educational experience covering 9 domains of modern Information & Communication Technology."/>
  <meta name="theme-color" content="#080808"/>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet"/>

  <!-- GSAP animation engine -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

  <link rel="stylesheet" href="styles.css"/>
</head>
<body>

  <!-- ═══ LOADER ═════════════════════════════════════════════════════ -->
  <div id="loader" class="loader" aria-hidden="true" role="status" aria-label="Loading">
    <div class="loader-inner">
      <div class="loader-brand">ICT</div>
      <div class="loader-track"><div class="loader-fill" id="loaderFill"></div></div>
      <div class="loader-status" id="loaderStatus">Initializing</div>
    </div>
  </div>

  <!-- ═══ CURSOR ══════════════════════════════════════════════════════ -->
  <div id="cursor" class="cursor" aria-hidden="true">
    <div class="cursor-core"></div>
    <svg class="cursor-orbit" viewBox="0 0 80 80">
      <circle class="orbit-ring" cx="40" cy="40" r="36" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
      <circle class="orbit-pip" cx="40" cy="4" r="2.5" fill="rgba(255,255,255,0.7)"/>
    </svg>
    <div class="cursor-label" id="cursorLabel"></div>
  </div>

  <!-- ═══ NOISE OVERLAY ════════════════════════════════════════════════ -->
  <div class="noise-overlay" aria-hidden="true"></div>

  <!-- ═══ GLOBAL PROGRESS ══════════════════════════════════════════════ -->
  <div class="scroll-progress" id="scrollProgress" aria-hidden="true">
    <div class="sp-fill" id="spFill"></div>
  </div>

  <!-- ═══ SIDEBAR ══════════════════════════════════════════════════════ -->
  <aside class="sidebar" id="sidebar" aria-label="Section navigation">
    <div class="sb-brand">
      <span class="sb-logo">ICT</span>
      <span class="sb-era">Modern Era</span>
    </div>

    <!-- Dynamically rendered by NavController -->
    <nav class="sb-nav" id="sidebarNav" aria-label="Sections"></nav>

    <div class="sb-footer">
      <div class="sb-indicator">
        <span class="sb-section-name" id="sbSectionName">Introduction</span>
        <div class="sb-progress-mini">
          <div class="sb-progress-fill" id="sbProgressFill"></div>
        </div>
      </div>
    </div>
  </aside>

  <!-- ═══ MOBILE HEADER ════════════════════════════════════════════════ -->
  <header class="mobile-header" id="mobileHeader">
    <div class="mh-left">
      <span class="mh-logo">ICT</span>
      <span class="mh-section" id="mhSection">Introduction</span>
    </div>
    <button class="mh-toggle" id="menuToggle" aria-label="Open navigation" aria-expanded="false">
      <span class="mh-bar"></span>
      <span class="mh-bar"></span>
    </button>
  </header>

  <!-- ═══ MOBILE NAV OVERLAY ═══════════════════════════════════════════ -->
  <div class="nav-overlay" id="navOverlay" aria-hidden="true">
    <div class="nav-overlay-inner" id="navOverlayInner">
      <!-- Populated by NavController -->
    </div>
    <div class="nav-overlay-footer">
      <span>ICT · Modern Era · 2025</span>
    </div>
  </div>

  <!-- ═══ BOTTOM DOCK (mobile) ═════════════════════════════════════════ -->
  <nav class="bottom-dock" id="bottomDock" aria-label="Quick navigation">
    <!-- Populated by NavController -->
  </nav>

  <!-- ═══ MAIN ══════════════════════════════════════════════════════════ -->
  <main class="main" id="main">
    <!-- All sections rendered by ContentRenderer -->
  </main>

  <!-- ═══ SCRIPTS ══════════════════════════════════════════════════════ -->
  <script src="script.js"></script>
</body>
</html>
